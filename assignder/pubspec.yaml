name: assignder
description: "Assignment reminder app for university students."
publish_to: "none"
version: 1.1.2+2

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  google_sign_in: ^7.2.0

  # State Management
  provider: ^6.1.2

  # Navigation
  go_router: ^14.2.7

  # Local Notifications
  flutter_local_notifications: ^17.2.2
  flutter_timezone: ^5.0.2
  timezone: ^0.9.4

  # Utilities
  intl: ^0.19.0
  equatable: ^2.0.5
  uuid: ^4.4.2
  change_app_package_name: ^1.5.0
  firebase_messaging: ^15.2.10

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
